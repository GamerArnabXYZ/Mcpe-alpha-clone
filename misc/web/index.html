<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Minecraft PE 0.6.1</title>
  <link rel="icon" href="data:,">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      /* overflow hidden prevents scroll but NOT keyboard resize */
      overflow: hidden;
      touch-action: none;
    }
    #canvas {
      display: block;
      /* Fixed size in CSS — actual pixels set by JS below */
      position: fixed;
      top: 0; left: 0;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #mobile-input {
      position: fixed;
      /* Place it visible on screen but tiny — some browsers need it in viewport */
      bottom: 0; left: 0;
      width: 1px; height: 1px;
      opacity: 0.01; /* not 0 — iOS ignores fully invisible inputs */
      font-size: 16px; /* Prevent iOS auto-zoom */
      border: none;
      background: transparent;
      color: transparent;
      outline: none;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>

<canvas id="canvas" tabindex="1"></canvas>
<input id="mobile-input" type="text"
       autocomplete="off" autocorrect="off"
       autocapitalize="off" spellcheck="false">

<script>
'use strict';

// ─── Canvas size management ───────────────────────────────────────────────────
var canvas = document.getElementById('canvas');
var _keyboardOpen = false;
// Store the "true" game size ignoring keyboard resize
var _gameW = 0, _gameH = 0;

function setCanvasToScreenSize() {
  // When keyboard is open, DON'T resize — keeps GL context alive
  if (_keyboardOpen) return;
  var w = window.innerWidth;
  var h = window.innerHeight;
  if (w === _gameW && h === _gameH) return;
  _gameW = w;
  _gameH = h;
  canvas.width  = w;
  canvas.height = h;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  // Tell Emscripten the new size
  if (typeof Module !== 'undefined' && Module.setCanvasSize) {
    try { Module.setCanvasSize(w, h); } catch(e) {}
  }
}

// Use visualViewport API when available — it excludes the keyboard area
if (window.visualViewport) {
  // visualViewport fires resize when keyboard opens/closes
  window.visualViewport.addEventListener('resize', function() {
    // If viewport height shrank by more than 150px → keyboard opened
    var shrink = window.screen.height - window.visualViewport.height;
    if (shrink > 150) {
      _keyboardOpen = true;
    } else {
      _keyboardOpen = false;
      setCanvasToScreenSize();
    }
  });
} else {
  window.addEventListener('resize', setCanvasToScreenSize);
}

setCanvasToScreenSize();

// ─── Emscripten Module ────────────────────────────────────────────────────────
var Module = {
  canvas: canvas,
  onRuntimeInitialized: function() {
    setCanvasToScreenSize();
    canvas.focus();
    _setupTouch();
  },
  setStatus: function(t) { if (t) console.log('[MCPE] ' + t); }
};

// ─── Mobile keyboard bridge ───────────────────────────────────────────────────
var mobileInput = document.getElementById('mobile-input');
var _lastVal = '';
var _kbFocused = false;

// Called by C++ AppPlatform_glfw::showKeyboard()
window._mcpeShowKeyboard = function() {
  _keyboardOpen = true;
  _kbFocused = true;
  mobileInput.style.pointerEvents = 'auto';
  mobileInput.value = '\u200b'; // zero-width space sentinel
  _lastVal = mobileInput.value;
  mobileInput.focus();
  // Small delay — let browser open keyboard before we do anything
  setTimeout(function() {
    mobileInput.setSelectionRange(1, 1);
  }, 100);
};

// Called by C++ AppPlatform_glfw::hideKeyboard()
window._mcpeHideKeyboard = function() {
  _keyboardOpen = false;
  _kbFocused = false;
  mobileInput.style.pointerEvents = 'none';
  mobileInput.blur();
  // Restore canvas size now that keyboard is gone
  setTimeout(setCanvasToScreenSize, 300);
};

// Input events → inject into GLFW
mobileInput.addEventListener('input', function() {
  var cur = mobileInput.value;
  var prev = _lastVal;

  if (cur.length > prev.length) {
    // Characters added — inject each as char event
    var added = cur.slice(prev.length);
    for (var i = 0; i < added.length; i++) {
      var cp = added.codePointAt(i);
      if (cp > 31 && cp !== 8203) { // skip zero-width space
        _injectChar(cp);
      }
    }
  } else if (cur.length < prev.length || cur === '\u200b') {
    // Backspace
    _injectKey(259, 1); // GLFW_KEY_BACKSPACE press
    _injectKey(259, 0); // GLFW_KEY_BACKSPACE release
  }

  _lastVal = cur;
  // Refill sentinel so backspace always works
  if (cur.length === 0 || cur === '') {
    mobileInput.value = '\u200b';
    _lastVal = '\u200b';
  }
});

mobileInput.addEventListener('keydown', function(e) {
  var k = _domToGlfw(e.key);
  if (k) { _injectKey(k, 1); e.preventDefault(); }
});
mobileInput.addEventListener('keyup', function(e) {
  var k = _domToGlfw(e.key);
  if (k) { _injectKey(k, 0); }
});

// Inject GLFW key event by dispatching to canvas (Emscripten GLFW web picks it up)
function _injectKey(glfwKey, action) {
  var type = action ? 'keydown' : 'keyup';
  canvas.dispatchEvent(new KeyboardEvent(type, {
    bubbles: true, cancelable: true,
    keyCode: glfwKey, which: glfwKey, charCode: 0
  }));
}

// Inject character via keypress (GLFW web char callback reads charCode)
function _injectChar(cp) {
  canvas.dispatchEvent(new KeyboardEvent('keypress', {
    bubbles: true, cancelable: true,
    charCode: cp, which: cp, keyCode: cp
  }));
}

function _domToGlfw(key) {
  switch (key) {
    case 'Enter':      return 257;
    case 'Escape':     return 256;
    case 'Backspace':  return 259;
    case 'Tab':        return 258;
    case 'ArrowLeft':  return 263;
    case 'ArrowRight': return 262;
    case 'ArrowUp':    return 265;
    case 'ArrowDown':  return 264;
    case 'Shift':      return 340;
    case 'Control':    return 341;
    case ' ':          return 32;
    default:           return 0;
  }
}

// ─── Touch input bridge ───────────────────────────────────────────────────────
var _touchSlots = {};
var _nextSlot = 0;

function _getSlot(id) {
  if (_touchSlots[id] === undefined) {
    _touchSlots[id] = (_nextSlot++) % 12;
  }
  return _touchSlots[id];
}
function _freeSlot(id) { delete _touchSlots[id]; }

function _feedTouch(action, btn, x, y, slot) {
  // Simulate mouse for slot 0 (primary finger)
  if (slot === 0) {
    var evType = action === 0 ? 'mousemove'
               : btn === 1   ? 'mousedown' : 'mouseup';
    canvas.dispatchEvent(new MouseEvent(evType, {
      bubbles: true, cancelable: true,
      clientX: x, clientY: y,
      button: 0, buttons: btn === 1 ? 1 : 0
    }));
  }
  // Also dispatch pointer event so GLFW web picks it up
  try {
    var pType = action === 0 ? 'pointermove'
              : btn === 1   ? 'pointerdown' : 'pointerup';
    canvas.dispatchEvent(new PointerEvent(pType, {
      bubbles: true, cancelable: true,
      pointerId: slot,
      clientX: x, clientY: y,
      pointerType: 'touch',
      isPrimary: slot === 0
    }));
  } catch(e) {}
}

function _setupTouch() {
  var opts = { passive: false };
  canvas.addEventListener('touchstart',  _onTouchStart,  opts);
  canvas.addEventListener('touchmove',   _onTouchMove,   opts);
  canvas.addEventListener('touchend',    _onTouchEnd,    opts);
  canvas.addEventListener('touchcancel', _onTouchEnd,    opts);
}

function _onTouchStart(e) {
  e.preventDefault();
  // On tap: if keyboard should be showing, re-focus input
  if (_kbFocused) { mobileInput.focus(); }
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    _feedTouch(1, 1, t.clientX|0, t.clientY|0, _getSlot(t.identifier));
  }
}
function _onTouchMove(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    _feedTouch(0, 0, t.clientX|0, t.clientY|0, _getSlot(t.identifier));
  }
}
function _onTouchEnd(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    _feedTouch(1, 0, t.clientX|0, t.clientY|0, _getSlot(t.identifier));
    _freeSlot(t.identifier);
  }
}

// ─── Pointer lock for desktop ─────────────────────────────────────────────────
canvas.addEventListener('click', function() {
  canvas.focus();
  if (!('ontouchstart' in window) && !_kbFocused) {
    if (canvas.requestPointerLock) canvas.requestPointerLock();
  }
});

// ─── Save to IndexedDB before unload ─────────────────────────────────────────
window.addEventListener('beforeunload', function() {
  if (typeof FS !== 'undefined') {
    try { FS.syncfs(false, function() {}); } catch(e) {}
  }
});
</script>

<script src="MinecraftPE.js"></script>
</body>
</html>
