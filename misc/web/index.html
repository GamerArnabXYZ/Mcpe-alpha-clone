<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Minecraft PE 0.6.1</title>
  <link rel="icon" href="data:,">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      touch-action: none;
    }
    #canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #kb {
      position: fixed;
      bottom: 2px; left: 2px;
      width: 1px; height: 1px;
      font-size: 16px;
      opacity: 0.02;
      border: none; outline: none;
      background: transparent;
      color: transparent;
      resize: none;
      z-index: 9999;
    }
  </style>
</head>
<body>

<canvas id="canvas" tabindex="1"></canvas>
<textarea id="kb" autocomplete="off" autocorrect="off"
          autocapitalize="off" spellcheck="false" rows="1"></textarea>

<script>
'use strict';

// ── Canvas size management ────────────────────────────────────────────────────
var canvas = document.getElementById('canvas');
var kb     = document.getElementById('kb');

var _kbOpen    = false;  // virtual keyboard currently visible
var _kbWanted  = false;  // C++ has requested keyboard (textbox focused)
var _gameW = 0, _gameH = 0;

function _applySize(w, h) {
  if (w === _gameW && h === _gameH) return;
  _gameW = w; _gameH = h;
  canvas.width        = w;
  canvas.height       = h;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  if (typeof Module !== 'undefined' && Module.setCanvasSize) {
    try { Module.setCanvasSize(w, h); } catch(e) {}
  }
}

function _syncSize() {
  if (_kbOpen) return;  // freeze while keyboard up
  _applySize(window.innerWidth, window.innerHeight);
}

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', function() {
    var shrink = (window.screen.availHeight || window.outerHeight)
                 - window.visualViewport.height;
    if (shrink > 150) {
      _kbOpen = true;
    } else {
      _kbOpen = false;
      requestAnimationFrame(_syncSize);
    }
  });
}
window.addEventListener('resize', _syncSize);
_syncSize();

// ── Emscripten Module ─────────────────────────────────────────────────────────
var Module = {
  canvas: canvas,
  onRuntimeInitialized: function() {
    _syncSize();
    canvas.focus();
    _initTouch();
  },
  setStatus: function(t) { if (t) console.log('[MCPE] ' + t); }
};

// ── Keyboard bridge ───────────────────────────────────────────────────────────
var _sentinel = '\u200b';
var _lastKbVal = _sentinel;

function _focusKb() {
  // Must be called inside a user-gesture handler to actually open keyboard
  kb.value   = _sentinel;
  _lastKbVal = _sentinel;
  kb.focus();
  try { kb.setSelectionRange(1, 1); } catch(e) {}
  _kbOpen = true;
}

function _blurKb() {
  _kbWanted = false;
  _kbOpen   = false;
  kb.blur();
  requestAnimationFrame(_syncSize);
}

// Called from C++ AppPlatform_glfw::showKeyboard() via emscripten_run_script
// NOTE: emscripten_run_script is NOT inside a user gesture, so on mobile
// this call alone won't open the keyboard. Instead we set _kbWanted=true
// and then _focusKb() is called on the very next touchstart.
window._mcpeShowKeyboard = function() {
  _kbWanted = true;
};

// Called from C++ AppPlatform_glfw::hideKeyboard()
window._mcpeHideKeyboard = function() {
  _blurKb();
};

// textarea input → inject GLFW key/char events
kb.addEventListener('input', function() {
  var cur  = kb.value;
  var prev = _lastKbVal;

  if (cur.length > prev.length) {
    var added = cur.slice(prev.length);
    for (var i = 0; i < added.length; i++) {
      var cp = added.codePointAt(i);
      if (cp !== 0x200b && cp > 31) _injectChar(cp);
    }
  } else {
    // backspace / deletion
    _injectKey(259, 1);
    _injectKey(259, 0);
  }

  _lastKbVal = cur;
  if (cur.length === 0) {
    kb.value   = _sentinel;
    _lastKbVal = _sentinel;
  }
});

kb.addEventListener('keydown', function(e) {
  var g = _toGlfw(e.key);
  if (g) { _injectKey(g, 1); e.preventDefault(); }
});
kb.addEventListener('keyup', function(e) {
  var g = _toGlfw(e.key);
  if (g) _injectKey(g, 0);
});

// If user dismisses keyboard manually (back button on Android)
kb.addEventListener('blur', function() {
  if (_kbWanted) {
    // Game still wants keyboard — mark closed but don't restore size yet
    _kbOpen = false;
  }
});

function _injectKey(glfwKey, action) {
  canvas.dispatchEvent(new KeyboardEvent(
    action ? 'keydown' : 'keyup',
    { bubbles: true, cancelable: true, keyCode: glfwKey, which: glfwKey }
  ));
}

function _injectChar(cp) {
  canvas.dispatchEvent(new KeyboardEvent('keypress', {
    bubbles: true, cancelable: true,
    charCode: cp, which: cp, keyCode: cp
  }));
}

function _toGlfw(key) {
  return { 'Enter':257, 'Escape':256, 'Backspace':259, 'Tab':258,
           'ArrowLeft':263, 'ArrowRight':262, 'ArrowUp':265, 'ArrowDown':264,
           'Shift':340, 'Control':341, ' ':32 }[key] || 0;
}

// ── Touch input ───────────────────────────────────────────────────────────────
var _slots = {}, _slotCtr = 0;
function _slot(id) {
  if (_slots[id] === undefined) _slots[id] = (_slotCtr++) % 12;
  return _slots[id];
}
function _freeSlot(id) { delete _slots[id]; }

function _feedTouch(action, btn, x, y, s) {
  if (s === 0) {
    canvas.dispatchEvent(new MouseEvent(
      action===0 ? 'mousemove' : btn ? 'mousedown' : 'mouseup',
      { bubbles:true, cancelable:true,
        clientX:x, clientY:y, button:0, buttons:btn?1:0 }
    ));
  }
  try {
    canvas.dispatchEvent(new PointerEvent(
      action===0 ? 'pointermove' : btn ? 'pointerdown' : 'pointerup',
      { bubbles:true, cancelable:true,
        pointerId:s, clientX:x, clientY:y,
        pointerType:'touch', isPrimary:s===0 }
    ));
  } catch(e) {}
}

function _initTouch() {
  var o = { passive: false };
  canvas.addEventListener('touchstart',  _ts, o);
  canvas.addEventListener('touchmove',   _tm, o);
  canvas.addEventListener('touchend',    _te, o);
  canvas.addEventListener('touchcancel', _te, o);
}

function _ts(e) {
  e.preventDefault();

  // *** KEY FIX ***
  // Only open keyboard if C++ has requested it (_kbWanted).
  // This is set by AppPlatform_glfw::showKeyboard() when a TextBox is clicked.
  // We call _focusKb() HERE (inside touchstart = user gesture) so the
  // browser allows the virtual keyboard to open.
  if (_kbWanted) {
    _focusKb();
  }

  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    _feedTouch(1, 1, t.clientX|0, t.clientY|0, _slot(t.identifier));
  }
}
function _tm(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    _feedTouch(0, 0, t.clientX|0, t.clientY|0, _slot(t.identifier));
  }
}
function _te(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    _feedTouch(1, 0, t.clientX|0, t.clientY|0, _slot(t.identifier));
    _freeSlot(t.identifier);
  }
}

// ── Desktop pointer lock ──────────────────────────────────────────────────────
canvas.addEventListener('click', function() {
  canvas.focus();
  if (!('ontouchstart' in window) && canvas.requestPointerLock) {
    canvas.requestPointerLock();
  }
});

// ── Save on close ─────────────────────────────────────────────────────────────
window.addEventListener('beforeunload', function() {
  if (typeof FS !== 'undefined') {
    try { FS.syncfs(false, function() {}); } catch(e) {}
  }
});
</script>

<script src="MinecraftPE.js"></script>
</body>
</html>
