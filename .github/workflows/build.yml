name: Build Game

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
    - '**'
    - '!no-build-**'

env:
  BUILD_TYPE: Release
  CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm-cache

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # Android build (arm64-v8a and armeabi-v7a)
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android (${{ matrix.abi }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        abi: [ arm64-v8a, armeabi-v7a ]

    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      ANDROID_NDK_PATH: ${{ github.workspace }}/android-ndk-r14b
      ANDROID_PLATFORM_API: 35
      ANDROID_BUILD_TOOLS_VERSION: 35.0.0
      # ADB set to /bin/true so the install step is silently skipped in CI
      # (no device attached). Remove or override locally if you want auto-install.
      ADB: /bin/true
      MATRIX_ABI: ${{ matrix.abi }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Android SDK (cmdline-tools) ──
      - name: Cache Android command-line tools
        id: cache-android-tools
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}
          key: android-cmdline-tools-v35

      - name: Setup Android command-line tools
        if: steps.cache-android-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          curl -fsSL -o cmdline-tools.zip \
            "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" \
             "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" \
            "platforms;android-${ANDROID_PLATFORM_API}" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}"

      # ── Android NDK r14b (required by this project's Android.mk) ──
      - name: Cache Android NDK r14b
        id: cache-android-ndk
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/android-ndk-r14b
          key: android-ndk-r14b-linux

      - name: Install Android NDK r14b
        if: steps.cache-android-ndk.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o ndk.zip \
            "https://dl.google.com/android/repository/android-ndk-r14b-linux-x86_64.zip"
          unzip -q ndk.zip -d "$GITHUB_WORKSPACE"

      # ── System packages needed by NDK r14b ──
      - name: Install system prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            wget unzip curl git python3 libncurses6 libtinfo6
          # NDK r14b toolchain needs libncurses.so.5 / libtinfo.so.5
          if ! ldconfig -p | grep -q "libncurses.so.5"; then
            sudo ln -sf /lib/x86_64-linux-gnu/libncurses.so.6 \
                        /usr/lib/x86_64-linux-gnu/libncurses.so.5 || true
          fi
          if ! ldconfig -p | grep -q "libtinfo.so.5"; then
            sudo ln -sf /lib/x86_64-linux-gnu/libtinfo.so.6 \
                        /usr/lib/x86_64-linux-gnu/libtinfo.so.5 || true
          fi

      # ── Java 21 (LTS, fully supported by d8/aapt2) ──
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # ── Build ──
      - name: Run Android build script
        run: |
          chmod +x ./build.sh
          ./build.sh

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: minecraftpe-apk-${{ matrix.abi }}
          path: ${{ github.workspace }}/build-apk/minecraftpe-*-debug.apk

  # ─────────────────────────────────────────────
  # Web build (Emscripten / WASM)
  # ─────────────────────────────────────────────
  build-web:
    name: Build Web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup caches
        uses: ./.github/actions/setup-cache
        with:
          host: linux
          target: linux

      - name: Setup Ninja
        uses: ./.github/actions/setup-ninja
        with:
          host: linux

      # emsdk 3.1.64 — latest stable as of 2025-Q2
      - name: Setup emsdk
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64
          actions-cache-folder: 'emsdk-cache'

      - name: Create build directory
        run: cmake -E make_directory ${{ github.workspace }}/build

      - name: Configure CMake (Emscripten)
        shell: bash
        working-directory: ${{ github.workspace }}/build
        run: |
          cmake "$GITHUB_WORKSPACE" \
            -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$EMSDK/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake"

      - name: Build
        working-directory: ${{ github.workspace }}/build
        run: cmake --build . --config $BUILD_TYPE --target MinecraftPE --parallel

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcpe-web
          path: |
            ${{ github.workspace }}/build/MinecraftPE.js
            ${{ github.workspace }}/build/MinecraftPE.wasm
            ${{ github.workspace }}/build/MinecraftPE.data

  # ─────────────────────────────────────────────
  # Publish dev release
  # ─────────────────────────────────────────────
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [ build-android, build-web ]
    # Only publish on pushes to branches (not on PRs)
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Declare version variables
        id: ref
        run: |
          echo "version=$(cat VERSION | xargs)" >> $GITHUB_OUTPUT
          echo "hash=$(git rev-parse --short "$GITHUB_SHA")"  >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Rename Android APKs
        run: |
          mv minecraftpe-apk-arm64-v8a/minecraftpe-v8a-debug.apk \
             minecraftpe-${{ steps.ref.outputs.hash }}-android-arm64-v8a.apk
          mv minecraftpe-apk-armeabi-v7a/minecraftpe-v7a-debug.apk \
             minecraftpe-${{ steps.ref.outputs.hash }}-android-armeabi-v7a.apk

      - name: Zip web artifact
        uses: vimtor/action-zip@v1.2
        with:
          files: >
            mcpe-web/MinecraftPE.js
            mcpe-web/MinecraftPE.wasm
            mcpe-web/MinecraftPE.data
            misc/web/index.html
          dest: minecraftpe-${{ steps.ref.outputs.hash }}-web.zip

      - name: Zip data assets
        uses: vimtor/action-zip@v1.2
        with:
          files: data
          recursive: false
          dest: data.zip

      - name: Publish development release
        uses: andelf/nightly-release@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: dev
          name: 'Development Release'
          body: |
            MinecraftPE ${{ steps.ref.outputs.version }} — dev build for commit ${{ github.sha }}.
          files: |
            ./data.zip
            ./minecraftpe-${{ steps.ref.outputs.hash }}-android-arm64-v8a.apk
            ./minecraftpe-${{ steps.ref.outputs.hash }}-android-armeabi-v7a.apk
            ./minecraftpe-${{ steps.ref.outputs.hash }}-web.zip
