name: Setup Ninja
description: Sets up Ninja build system

inputs:
  host:
    description: 'Host platform: win, mac or linux'
    required: true

runs:
  using: "composite"
  steps:
  - name: Install Ninja (apt — fastest on ubuntu-latest)
    if: inputs.host == 'linux'
    shell: bash
    run: |
      sudo apt-get install -y --no-install-recommends ninja-build
      echo "Ninja version: $(ninja --version)"

  - name: Install Ninja (win)
    if: inputs.host == 'win'
    shell: pwsh
    run: |
      choco install ninja -y --no-progress
      echo "Ninja version: $(ninja --version)"

  - name: Install Ninja (mac)
    if: inputs.host == 'mac'
    shell: bash
    run: |
      brew install ninja
      echo "Ninja version: $(ninja --version)"
